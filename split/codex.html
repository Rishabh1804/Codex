/* --- Volume Create/Edit --- */
function openCreateVolume() { openVolumeForm(null); }
function openEditVolume(volumeId) { openVolumeForm(volumeId); }

function openVolumeForm(volumeId) {
  var isEdit = !!volumeId;
  var vol = isEdit ? store.volumes.find(function(v) { return v.id === volumeId; }) : null;

  var body = '';
  body += renderTextField('name', 'Name', vol ? vol.name : '', { required: true, placeholder: 'e.g. SproutLab' });
  body += renderTextarea('description', 'Description', vol ? vol.description : '', { placeholder: 'What is this project about?' });
  body += renderTextField('current_phase', 'Current Phase', vol ? vol.current_phase : '', { placeholder: 'e.g. Phase 1 — Core build' });
  body += renderColorField('domain_color', 'Domain Color', vol ? vol.domain_color : '#8B7355');
  body += renderTextField('tags', 'Tags (comma-separated)', vol ? (vol.tags || []).join(', ') : '', { placeholder: 'pwa, health, tracking' });
  body += renderTextField('repo', 'Repo', vol ? vol.repo || '' : '', { placeholder: 'owner/repo' });

  var footer = '<button data-action="closeOverlay" class="cx-btn-secondary">Cancel</button>'
    + '<button data-action="handleSaveVolume" data-id="' + escAttr(volumeId || '') + '" class="cx-btn-primary" style="flex:1">'
    + cx('check') + ' ' + (isEdit ? 'Save' : 'Create') + '</button>';

  openOverlay(isEdit ? 'Edit Volume' : 'New Volume', body, footer);
  setTimeout(function() { var el = document.getElementById('field-name'); if (el) el.focus(); }, OVERLAY_ANIM_MS);
}

function handleSaveVolume(volumeId) {
  var name = (document.getElementById('field-name') || {}).value || '';
  var desc = (document.getElementById('field-description') || {}).value || '';
  var phase = (document.getElementById('field-current_phase') || {}).value || '';
  var color = (document.getElementById('field-domain_color') || {}).value || '#8B7355';
  var tagsStr = (document.getElementById('field-tags') || {}).value || '';
  var repo = (document.getElementById('field-repo') || {}).value || '';

  name = name.trim();
  if (!name) { showToast('Name is required', 'error'); return; }

  var tags = tagsStr.split(',').map(function(t) { return t.trim(); }).filter(function(t) { return t.length > 0; });

  try {
    if (volumeId) {
      store.updateVolume(volumeId, { name: name, description: desc, current_phase: phase, domain_color: color, tags: tags, repo: repo || null });
      showToast('Volume updated', 'success');
    } else {
      var id = autoSlug(name);
      if (store.volumes.find(function(v) { return v.id === id; })) { showToast('Volume with this name already exists', 'error'); return; }
      store.addVolume({ id: id, name: name, description: desc, current_phase: phase, domain_color: color, tags: tags, repo: repo || null });
      showToast('Volume created', 'success');
    }
    closeOverlay();
    renderCurrentView();
  } catch(e) { showToast(e.message, 'error'); }
}

/* --- Chapter Create/Edit --- */
function openAddChapter(volumeId) { openChapterForm(volumeId, null); }
function openEditChapter(volumeId, chapterId) { openChapterForm(volumeId, chapterId); }

function openChapterForm(volumeId, chapterId) {
  var isEdit = !!chapterId;
  var vol = store.volumes.find(function(v) { return v.id === volumeId; });
  if (!vol) return;
  var ch = isEdit ? (vol.chapters || []).find(function(c) { return c.id === chapterId; }) : null;

  var statusOpts = CHAPTER_STATUSES.map(function(s) { return { value: s, label: s }; });
  var body = '';
  body += renderTextField('ch_name', 'Name', ch ? ch.name : '', { required: true, placeholder: 'e.g. CareTickets' });
  body += renderSelect('ch_status', 'Status', ch ? ch.status : 'planned', statusOpts);
  body += renderTextarea('ch_summary', 'Summary', ch ? ch.summary : '', { placeholder: 'Brief description' });
  body += renderDateField('ch_started', 'Started', ch ? ch.started || '' : '');
  body += renderTextField('ch_spec_url', 'Spec URL', ch ? ch.spec_url || '' : '', { placeholder: 'https://...' });

  var footer = '<button data-action="closeOverlay" class="cx-btn-secondary">Cancel</button>';
  if (isEdit) {
    footer += '<button data-action="handleDeleteChapter" data-vol="' + escAttr(volumeId) + '" data-id="' + escAttr(chapterId) + '" class="cx-btn-danger cx-btn-sm">' + cx('trash') + '</button>';
  }
  footer += '<button data-action="handleSaveChapter" data-vol="' + escAttr(volumeId) + '" data-id="' + escAttr(chapterId || '') + '" class="cx-btn-primary" style="flex:1">'
    + cx('check') + ' ' + (isEdit ? 'Save' : 'Add') + '</button>';

  setTimeout(function() { var el = document.getElementById('field-ch_name'); if (el) el.focus(); }, OVERLAY_ANIM_MS);

function handleSaveChapter(volumeId, chapterId) {
  var name = (document.getElementById('field-ch_name') || {}).value || '';
  var status = (document.getElementById('field-ch_status') || {}).value || 'planned';
  var summary = (document.getElementById('field-ch_summary') || {}).value || '';
  var started = (document.getElementById('field-ch_started') || {}).value || null;
  var specUrl = (document.getElementById('field-ch_spec_url') || {}).value || null;
  name = name.trim();
  if (!name) { showToast('Name is required', 'error'); return; }
  try {
    if (chapterId) {
      store.updateChapter(volumeId, chapterId, { name: name, status: status, summary: summary, started: started, spec_url: specUrl });
      showToast('Chapter updated', 'success');
    } else {
      var id = autoSlug(name);
      store.addChapter(volumeId, { id: id, name: name, status: status, summary: summary, started: started, spec_url: specUrl });
      showToast('Chapter added', 'success');
    }
    closeOverlay(); renderCurrentView();
  } catch(e) { showToast(e.message, 'error'); }
}

function handleDeleteChapter(volumeId, chapterId) {
  var vol = store.volumes.find(function(v) { return v.id === volumeId; });
  var ch = vol ? (vol.chapters || []).find(function(c) { return c.id === chapterId; }) : null;
  if (!ch) return;
  showConfirmDialog('Delete Chapter', 'Delete "' + ch.name + '"? This is a soft delete.', function() {
    try {
      store.deleteChapter(volumeId, chapterId); showToast('Chapter deleted', 'success'); closeOverlay(); closeConfirmDialog();

/* --- Export --- */
function handleExportData() {
  var data = store.getSnapshot();
  data._exported = new Date().toISOString();
  data._version = CODEX_VERSION;
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'codex-export-' + localDateStr() + '.json';
  a.click(); URL.revokeObjectURL(url);
  showToast('Exported', 'success');
}

/* --- Restore from Backup --- */
function openRestoreData() {
  var body = '<p style="color:var(--text-secondary);margin-bottom:var(--sp-12)">Select a Codex JSON export to restore all data. This replaces your current library.</p>';
  body += '<input type="file" id="restoreFileInput" accept=".json,application/json" style="display:none">';
  body += '<button data-action="triggerRestoreFile" class="cx-btn-secondary" style="width:100%;padding:var(--sp-16);margin-bottom:var(--sp-12)">' + cx('download') + ' Choose Backup File</button>';
  body += '<div id="restoreFileStatus" style="color:var(--text-secondary);font-size:var(--fs-sm)"></div>';

  var footer = '<button data-action="closeOverlay" class="cx-btn-secondary">Cancel</button>'
    + '<button data-action="handleRestoreData" class="cx-btn-primary" style="flex:1" id="restoreBtn" disabled>' + cx('check') + ' Restore</button>';

  openOverlay('Restore from Backup', body, footer);
  setTimeout(function() {
    var input = document.getElementById('restoreFileInput');
    if (input) input.addEventListener('change', handleRestoreFileSelect);
  }, 50);
}

var _restoreParsed = null;

function triggerRestoreFile() {
  var input = document.getElementById('restoreFileInput');
  if (input) input.click();
}

function handleRestoreFileSelect(e) {
  var file = e.target.files[0];
  if (!file) return;
  var status = document.getElementById('restoreFileStatus');
  var btn = document.getElementById('restoreBtn');
  var reader = new FileReader();
  reader.onload = function(ev) {
    try {
      var data = JSON.parse(ev.target.result);
      if (!data.volumes || !Array.isArray(data.volumes)) {
        if (status) status.innerHTML = '<span style="color:var(--error)">Invalid backup: missing volumes array</span>';
        _restoreParsed = null;
        if (btn) btn.disabled = true;
        return;
      }
      _restoreParsed = data;
      var summary = data.volumes.length + ' volumes, ' + (data.canons || []).length + ' canons, '
        + (data.apocrypha || []).length + ' apocrypha, ' + (data.lore || []).length + ' lore, '
        + (data.journal || []).flatMap(function(d) { return d.sessions || []; }).length + ' sessions';
      if (status) status.innerHTML = '<span style="color:var(--success)">' + cx('check') + ' ' + escHtml(file.name) + '</span><br><span style="color:var(--text-tertiary)">' + escHtml(summary) + '</span>';
      if (btn) btn.disabled = false;
    } catch(err) {
      if (status) status.innerHTML = '<span style="color:var(--error)">Invalid JSON: ' + escHtml(err.message) + '</span>';
      _restoreParsed = null;
      if (btn) btn.disabled = true;
    }
  };
  reader.readAsText(file);
}

function handleRestoreData() {
  if (!_restoreParsed) { showToast('Select a backup file first', 'warning'); return; }

  showConfirmDialog('Restore Data', 'This will replace ALL current data with the backup. Are you sure?', function() {
    try {
      store.volumes = _restoreParsed.volumes || [];
      store.canons = _restoreParsed.canons || [];
      store.schisms = _restoreParsed.schisms || [];
      store.apocrypha = _restoreParsed.apocrypha || [];
      store.lore = _restoreParsed.lore || [];
      store.journal = _restoreParsed.journal || [];
      store._cacheToLocalStorage();
      _restoreParsed = null;
      showToast('Data restored', 'success');
      closeConfirmDialog();
      closeOverlay();
      renderCurrentView();
    } catch(e) { showToast('Restore failed: ' + e.message, 'error'); closeConfirmDialog(); }
  }, { danger: true, label: 'Restore' });
}

function handleSaveSession() {

  var openTodos = todosStr.split(',').map(function(s) { return s.trim(); }).filter(Boolean);

  try {

      volumes_touched: volumes,
      chapters_touched: chapters,
      decisions: decisions,
      bugs_found: bugsFound,

      duration_minutes: duration,
      open_todos: openTodos,

    });

function handleSaveCanon(canonId) {
  var title = (document.getElementById('field-canon_title') || {}).value || '';
  var scope = (document.getElementById('field-canon_scope') || {}).value || 'global';
  var category = (document.getElementById('field-canon_category') || {}).value || 'design';
  var rationale = (document.getElementById('field-canon_rationale') || {}).value || '';
  var refsStr = (document.getElementById('field-canon_references') || {}).value || '';
  var created = (document.getElementById('field-canon_created') || {}).value || localDateStr().substring(0, 7);

  title = title.trim();
  if (!title) { showToast('Title is required', 'error'); return; }
  if (!rationale.trim()) { showToast('Rationale is required', 'error'); return; }

  var refs = refsStr.split(',').map(function(s) { return s.trim(); }).filter(Boolean);

  try {
    if (canonId) {
      // Edit existing canon
      var canon = store.canons.find(function(c) { return c.id === canonId; });
      if (!canon) { showToast('Canon not found', 'error'); return; }
      var status = (document.getElementById('field-canon_status') || {}).value || 'active';
      var supersededBy = (document.getElementById('field-canon_superseded_by') || {}).value || null;
      if (supersededBy) supersededBy = supersededBy.trim() || null;

      store.updateCanon(canonId, { title: title, scope: scope, category: category, status: status, superseded_by: supersededBy, rationale: rationale.trim(), references: refs, created: created });
      showToast('Canon updated', 'success');
    } else {
      // Create new canon
      var allIds = store.canons.map(function(c) { return c.id; });
      var id = generateId('canon', allIds) + '-' + autoSlug(title).substring(0, 20);
      var newCanon = {
        id: id, scope: scope, category: category, title: title,
        rationale: rationale.trim(), created: created, status: 'active',
        superseded_by: null, references: refs, _deleted: false, _deleted_date: null
      };
      store.addCanon(newCanon);
      showToast('Canon created', 'success');
    }
    closeOverlay();
    renderCurrentView();
  } catch(e) { showToast(e.message, 'error'); }
}

function handleDeleteCanon(canonId) {
  var canon = store.canons.find(function(c) { return c.id === canonId; });
  if (!canon) return;
  // Check if anything supersedes this
  var refs = store.canons.filter(function(c) { return c.superseded_by === canonId && !c._deleted; });
  var msg = 'Soft-delete "' + canon.title + '"?';
  if (refs.length > 0) msg += ' Warning: ' + refs.length + ' canon(s) reference this as superseded_by.';
  showConfirmDialog('Delete Canon', msg, function() {
    try {
      store.deleteCanon(canonId);
      showToast('Canon deleted', 'success');
      closeConfirmDialog();
      navigate('#/canons');
    } catch(e) { showToast(e.message, 'error'); closeConfirmDialog(); }
  }, { danger: true, label: 'Delete' });
}

function openLoreForm(loreId, prefill) {
  var isEdit = !!loreId;
  var l = isEdit ? store.lore.find(function(x) { return x.id === loreId; }) : null;
  var seed = l || prefill || {};

  var catOpts = LORE_CATEGORIES.map(function(c) { return { value: c, label: LORE_CATEGORY_LABELS[c] }; });

  // Domain multi-select: render as checkbox group over active volumes
  var activeVols = filterActive(store.volumes);
  var selectedDomains = (seed.domain && Array.isArray(seed.domain)) ? seed.domain : [];

  var body = '';
  body += renderTextField('lore_title', 'Title', seed.title || '', { required: true, placeholder: 'e.g. The Naming of the Order' });
  body += renderSelect('lore_category', 'Category', seed.category || 'origins', catOpts, { required: true });
  body += renderTextarea('lore_body', 'Narrative', seed.body || '', { required: true, rows: 10, placeholder: 'Backward-looking knowledge. The why behind the what.' });

  // Domain checkboxes
  if (activeVols.length > 0) {
    body += '<div class="cx-form-group"><label class="cx-form-label">Domain</label><div class="cx-checkbox-group">';
    activeVols.forEach(function(v) {
      var checked = selectedDomains.indexOf(v.id) !== -1 ? ' checked' : '';
      body += '<label class="cx-checkbox-item"><input type="checkbox" name="lore_domain" value="' + escAttr(v.id) + '"' + checked + '><span>' + escHtml(v.name) + '</span></label>';
    });
    body += '</div></div>';
  }

  body += renderTextField('lore_tags', 'Tags (comma-separated)', (seed.tags || []).join(', '), { placeholder: 'e.g. governance, roman, hierarchy' });
  body += renderTextField('lore_references', 'References (comma-separated IDs)', (seed.references || []).join(', '), { placeholder: 'canon-NNNN-slug, volume-id, chapter-slug' });
  if (isEdit) {
    body += renderTextField('lore_created', 'Created', seed.created || '', { placeholder: 'YYYY-MM-DD' });
  }

  var footer = '<button data-action="closeOverlay" class="cx-btn-secondary">Cancel</button>'
    + '<button data-action="handleSaveLore" data-id="' + escAttr(loreId || '') + '" class="cx-btn-primary" style="flex:1">'
    + cx('check') + ' ' + (isEdit ? 'Save' : 'Create') + '</button>';

  openOverlay(isEdit ? 'Edit Lore' : 'New Lore', body, footer);
  setTimeout(function() { var el = document.getElementById('field-lore_title'); if (el) el.focus(); }, OVERLAY_ANIM_MS);
}

function handleSaveLore(loreId) {
  var title = (document.getElementById('field-lore_title') || {}).value || '';
  var category = (document.getElementById('field-lore_category') || {}).value || 'origins';
  var body = (document.getElementById('field-lore_body') || {}).value || '';
  var tagsStr = (document.getElementById('field-lore_tags') || {}).value || '';
  var refsStr = (document.getElementById('field-lore_references') || {}).value || '';

  title = title.trim();
  body = body.trim();
  if (!title) { showToast('Title is required', 'error'); return; }
  if (!body) { showToast('Narrative is required', 'error'); return; }
  if (LORE_CATEGORIES.indexOf(category) === -1) { showToast('Invalid category', 'error'); return; }

  var domainBoxes = document.querySelectorAll('input[name="lore_domain"]:checked');
  var domain = [];
  for (var i = 0; i < domainBoxes.length; i++) domain.push(domainBoxes[i].value);

  var tags = tagsStr.split(',').map(function(s) { return s.trim(); }).filter(Boolean);
  var refs = refsStr.split(',').map(function(s) { return s.trim(); }).filter(Boolean);

  try {
    if (loreId) {
      var createdField = (document.getElementById('field-lore_created') || {}).value || null;
      var patch = { title: title, category: category, body: body, domain: domain, tags: tags, references: refs };
      if (createdField) patch.created = createdField;
      store.updateLore(loreId, patch);
      showToast('Lore updated', 'success');
    } else {
      var allIds = store.lore.map(function(x) { return x.id; });
      var id = generateId('lore', allIds) + '-' + autoSlug(title).substring(0, 20);
      store.addLore({
        id: id, title: title, category: category, body: body,
        domain: domain, tags: tags, references: refs,
        sourceType: 'manual', sourceId: null
      });
      showToast('Lore created', 'success');
    }
    closeOverlay();
    renderCurrentView();
  } catch(e) { showToast(e.message, 'error'); }
}

function handleDeleteLore(loreId) {
  var l = store.lore.find(function(x) { return x.id === loreId; });
  if (!l) return;
  showConfirmDialog('Delete Lore', 'Soft-delete "' + l.title + '"? It will appear in Trash.', function() {
    try {
      store.deleteLore(loreId);
      showToast('Lore deleted', 'success');
      closeConfirmDialog();
      if (_currentView === 'lore-detail') navigate('#/lore');
      else renderCurrentView();
    } catch(e) { showToast(e.message, 'error'); closeConfirmDialog(); }
  }, { danger: true, label: 'Delete' });
}

function handleCopyLoreJson(loreId) {
  var l = store.lore.find(function(x) { return x.id === loreId; });
  if (!l) return;
  var copy = deepClone(l);
  delete copy._deleted;
  delete copy._deleted_date;
  copyToClipboard(JSON.stringify(copy, null, 2), 'Lore JSON copied');
}

function handleSaveSchism() {
  var rejected = (document.getElementById('field-rej_rejected') || {}).value || '';
  var chosen = (document.getElementById('field-rej_chosen') || {}).value || '';
  var reason = (document.getElementById('field-rej_reason') || {}).value || '';
  var context = (document.getElementById('field-rej_context') || {}).value || '';
  var volumesStr = (document.getElementById('field-rej_volumes') || {}).value || '';
  var date = (document.getElementById('field-rej_date') || {}).value || localDateStr();
  var canonId = (document.getElementById('field-rej_canon_id') || {}).value || null;

  rejected = rejected.trim(); chosen = chosen.trim(); reason = reason.trim();
  if (!rejected) { showToast('Rejected option is required', 'error'); return; }
  if (!chosen) { showToast('Chosen option is required', 'error'); return; }
  if (!reason) { showToast('Reason is required', 'error'); return; }

  var volumes = volumesStr.split(',').map(function(s) { return s.trim(); }).filter(Boolean);

  try {
    var allIds = store.schisms.map(function(r) { return r.id; });
    var id = generateId('rej', allIds) + '-' + autoSlug(rejected).substring(0, 20);
    store.addSchism({
      id: id, context: context.trim() || null, volumes: volumes,
      rejected: rejected, chosen: chosen, reason: reason,
      date: date, canon_id: (canonId && canonId.trim()) || null
    });
    showToast('Schism recorded', 'success');
    closeOverlay();
    renderCurrentView();
  } catch(e) { showToast(e.message, 'error'); }
}

var _snippetParsed = null;

function openSnippetImport() {
  _snippetParsed = null;
  var body = '<p style="font-size:var(--fs-xs);color:var(--text-secondary);margin-bottom:var(--sp-12)">Paste an Aurelius JSON snippet from a build session.</p>';
  body += '<textarea id="snippetInput" class="cx-form-textarea cx-snippet-input" rows="8" placeholder="Paste JSON here\u2026"></textarea>';
  body += '<div id="snippetPreview"></div>';

  var footer = '<button data-action="closeOverlay" class="cx-btn-secondary">Cancel</button>'
    + '<button data-action="previewSnippet" class="cx-btn-secondary">' + cx('search') + ' Preview</button>'
    + '<button data-action="importSnippet" class="cx-btn-primary" style="flex:1" disabled id="snippetImportBtn">' + cx('download') + ' Import</button>';
  openOverlay('Import Aurelius Snippet', body, footer);
}

function handlePreviewSnippet() {
  var input = document.getElementById('snippetInput');
  var preview = document.getElementById('snippetPreview');
  var importBtn = document.getElementById('snippetImportBtn');
  if (!input || !preview) return;

  var raw = input.value.trim();
  // Strip code fences
  raw = raw.replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/\s*```$/i, '');

  try {
    var parsed = JSON.parse(raw);
    _snippetParsed = parsed;
  } catch(e) {
    preview.innerHTML = '<div class="cx-form-error" style="display:block;margin-top:var(--sp-8)">Invalid JSON: ' + escHtml(e.message) + '</div>';
    if (importBtn) importBtn.disabled = true;
    return;
  }

  if (!_snippetParsed._snippet_version) {
    preview.innerHTML = '<div class="cx-form-error" style="display:block;margin-top:var(--sp-8)">Missing _snippet_version field</div>';
    if (importBtn) importBtn.disabled = true;
    return;
  }

  var html = '<div style="margin-top:var(--sp-12)">';

  // Preview session
  if (_snippetParsed.session) {
    var s = _snippetParsed.session;
    var exists = store.journal.some(function(d) {
      return d.date === s.date && (d.sessions || []).some(function(x) { return x.id === s.id; });
    });
    html += '<div class="cx-preview-item">' + (exists ? '<span class="cx-preview-skip">\u2717</span> Session (exists)' : '<span class="cx-preview-ok">\u2713</span> Session: ' + escHtml(s.date)) + '</div>';
  }

  // Preview canons
  if (_snippetParsed.canons && _snippetParsed.canons.length > 0) {
    _snippetParsed.canons.forEach(function(c) {
      var exists = store.canons.some(function(x) { return x.id === c.id; });
      html += '<div class="cx-preview-item">' + (exists ? '<span class="cx-preview-skip">\u2717</span> Canon ' + escHtml(c.id) + ' (exists)' : '<span class="cx-preview-ok">\u2713</span> Canon: ' + escHtml(c.title || c.id)) + '</div>';
    });
  }

  // Preview schisms
  var _previewSchisms = _snippetParsed.schisms || _snippetParsed.rejections;
  if (_previewSchisms && _previewSchisms.length > 0) {
    _previewSchisms.forEach(function(r) {
      var exists = store.schisms.some(function(x) { return x.id === r.id; });
      html += '<div class="cx-preview-item">' + (exists ? '<span class="cx-preview-skip">\u2717</span> Schism ' + escHtml(r.id) + ' (exists)' : '<span class="cx-preview-ok">\u2713</span> Schism: ' + escHtml(r.rejected || r.id)) + '</div>';
    });
  }

  // Preview todos
  if (_snippetParsed.todos && _snippetParsed.todos.length > 0) {
    _snippetParsed.todos.forEach(function(t) {
      var vol = store.volumes.find(function(v) { return v.id === t.volume; });
      var volName = vol ? vol.name : t.volume;
      html += '<div class="cx-preview-item"><span class="cx-preview-ok">\u2713</span> TODO in ' + escHtml(volName) + ': ' + escHtml(t.todo ? t.todo.text : '?') + '</div>';
    });
  }

  // Preview new_chapters (Phase 5)
  if (_snippetParsed.new_chapters && _snippetParsed.new_chapters.length > 0) {
    _snippetParsed.new_chapters.forEach(function(nc) {
      var pvol = store.volumes.find(function(v) { return v.id === nc.volume; });
      var exists = pvol && (pvol.chapters || []).some(function(c) { return c.id === nc.chapter.id; });
      html += '<div class="cx-preview-item">' + (exists
        ? '<span class="cx-preview-skip">\u2717</span> Chapter ' + escHtml(nc.chapter.name) + ' (exists)'
        : '<span class="cx-preview-ok">\u2713</span> New chapter: ' + escHtml(nc.chapter.name)) + '</div>';
    });
  }

  // Preview chapter_updates
  if (_snippetParsed.chapter_updates && _snippetParsed.chapter_updates.length > 0) {
    _snippetParsed.chapter_updates.forEach(function(cu) {
      var pvol = store.volumes.find(function(v) { return v.id === cu.volume; });
      var pch = pvol ? (pvol.chapters || []).find(function(c) { return c.id === cu.chapter; }) : null;
      html += '<div class="cx-preview-item">' + (pch
        ? '<span class="cx-preview-ok">\u2713</span> Update: ' + escHtml(pch.name)
        : '<span class="cx-preview-skip">\u2717</span> ' + escHtml(cu.chapter) + ' (not found)') + '</div>';
    });
  }

  // Preview canon_updates
  if (_snippetParsed.canon_updates && _snippetParsed.canon_updates.length > 0) {
    _snippetParsed.canon_updates.forEach(function(cu) {
      var pc = store.canons.find(function(c) { return c.id === cu.id; });
      html += '<div class="cx-preview-item">' + (pc
        ? '<span class="cx-preview-ok">\u2713</span> Update canon: ' + escHtml(pc.title || cu.id)
        : '<span class="cx-preview-skip">\u2717</span> Canon ' + escHtml(cu.id) + ' (not found)') + '</div>';
    });
  }

  // Preview todo_updates
  if (_snippetParsed.todo_updates && _snippetParsed.todo_updates.length > 0) {
    _snippetParsed.todo_updates.forEach(function(tu) {
      var tvol = store.volumes.find(function(v) { return v.id === tu.volume; });
      var ttodo = tvol ? (tvol.todos || []).find(function(t) { return t.id === tu.todo; }) : null;
      html += '<div class="cx-preview-item">' + (ttodo
        ? '<span class="cx-preview-ok">\u2713</span> Update TODO: ' + escHtml(ttodo.text || tu.todo)
        : '<span class="cx-preview-skip">\u2717</span> TODO ' + escHtml(tu.todo) + ' (not found)') + '</div>';
    });
  }

  // Preview volume_updates
  if (_snippetParsed.volume_updates && _snippetParsed.volume_updates.length > 0) {
    _snippetParsed.volume_updates.forEach(function(vu) {
      var tvol = store.volumes.find(function(v) { return v.id === vu.id; });
      html += '<div class="cx-preview-item">' + (tvol
        ? '<span class="cx-preview-ok">\u2713</span> Update volume: ' + escHtml(tvol.name) + (vu.patch.current_phase ? ' \u2192 ' + escHtml(vu.patch.current_phase) : '')
        : '<span class="cx-preview-skip">\u2717</span> Volume ' + escHtml(vu.id) + ' (not found)') + '</div>';
    });
  }

  // Preview apocrypha (Phase 5 — upsert)
  if (_snippetParsed.apocrypha && _snippetParsed.apocrypha.length > 0) {
    _snippetParsed.apocrypha.forEach(function(a) {
      var exists = store.apocrypha.some(function(x) { return x.id === a.id; });
      html += '<div class="cx-preview-item">' + (exists
        ? '<span class="cx-preview-ok">\u2713</span> Update apocryphon: ' + escHtml(a.title)
        : '<span class="cx-preview-ok">\u2713</span> Apocryphon: ' + escHtml(a.title)) + '</div>';
    });
  }

  // Preview lore (Phase 1 — upsert). Accept both `lore` and legacy `new_lore` shapes.
  var _previewLore = _snippetParsed.lore || [];
  if (_snippetParsed.new_lore && Array.isArray(_snippetParsed.new_lore)) {
    _snippetParsed.new_lore.forEach(function(op) {
      var d = op.data || op;
      if (d && d.id) _previewLore.push(d);
    });
  }
  if (_previewLore.length > 0) {
    _previewLore.forEach(function(l) {
      var catOk = l.category && LORE_CATEGORIES.indexOf(l.category) !== -1;
      var exists = store.lore.some(function(x) { return x.id === l.id; });
      var catLbl = catOk ? LORE_CATEGORY_LABELS[l.category] : (l.category || 'uncategorized');
      html += '<div class="cx-preview-item">' + (!catOk
        ? '<span class="cx-preview-skip">\u2717</span> Lore ' + escHtml(l.id) + ' (invalid category: ' + escHtml(l.category || '?') + ')'
        : exists
          ? '<span class="cx-preview-ok">\u2713</span> Update lore: ' + escHtml(l.title) + ' <span class="cx-card-meta">(' + escHtml(catLbl) + ')</span>'
          : '<span class="cx-preview-ok">\u2713</span> Lore: ' + escHtml(l.title) + ' <span class="cx-card-meta">(' + escHtml(catLbl) + ')</span>') + '</div>';
    });
  }

  html += '</div>';
  preview.innerHTML = html;
  if (importBtn) importBtn.disabled = false;
}

function handleImportSnippet() {
  if (!_snippetParsed) { showToast('Preview first', 'warning'); return; }
  var counts = { sessions: 0, canons: 0, schisms: 0, todos: 0, newChapters: 0, chapterUpdates: 0, canonUpdates: 0, todoUpdates: 0, volumeUpdates: 0, apocrypha: 0, lore: 0 };

  try {
    // 1. Session
    if (_snippetParsed.session) {
      var s = _snippetParsed.session;
      var exists = store.journal.some(function(d) {
        return d.date === s.date && (d.sessions || []).some(function(x) { return x.id === s.id; });
      });
      if (!exists) {
        store.addJournalSession(s.date, s);
        counts.sessions++;
      }
    }

    // 2. Canons
    if (_snippetParsed.canons) {
      _snippetParsed.canons.forEach(function(c) {
        var exists = store.canons.some(function(x) { return x.id === c.id; });
        if (!exists) {
          if (!c._deleted) c._deleted = false;
          if (!c._deleted_date) c._deleted_date = null;
          store.addCanon(c);
          counts.canons++;
        }
      });
    }

    // 3. Schisms
    var _importSchisms = _snippetParsed.schisms || _snippetParsed.rejections;
    if (_importSchisms) {
      _importSchisms.forEach(function(r) {
        var exists = store.schisms.some(function(x) { return x.id === r.id; });
        if (!exists) {
          store.addSchism(r);
          counts.schisms++;
        }
      });
    }

    // 4. TODOs
    if (_snippetParsed.todos) {
      _snippetParsed.todos.forEach(function(t) {
        try {
          store.addTodo(t.volume, t.todo);
          counts.todos++;
        } catch(e) { /* skip if volume not found or duplicate */ }
      });
    }

    // 5. New chapters (Phase 5 — before chapter_updates)
    if (_snippetParsed.new_chapters) {
      _snippetParsed.new_chapters.forEach(function(nc) {
        try {
          store.addChapter(nc.volume, nc.chapter);
          counts.newChapters++;
        } catch(e) { /* skip if volume not found or duplicate */ }
      });
    }

    // 6. Chapter updates
    if (_snippetParsed.chapter_updates) {
      _snippetParsed.chapter_updates.forEach(function(cu) {
        try {
          store.updateChapter(cu.volume, cu.chapter, cu.patch);
          counts.chapterUpdates++;
        } catch(e) { /* skip if not found */ }
      });
    }

    // 6b. Canon updates
    if (_snippetParsed.canon_updates) {
      _snippetParsed.canon_updates.forEach(function(cu) {
        try {
          store.updateCanon(cu.id, cu.patch);
          counts.canonUpdates++;
        } catch(e) { /* skip if not found */ }
      });
    }

    // 6c. TODO updates
    if (_snippetParsed.todo_updates) {
      _snippetParsed.todo_updates.forEach(function(tu) {
        try {
          store.updateTodo(tu.volume, tu.todo, tu.patch);
          counts.todoUpdates++;
        } catch(e) { /* skip if not found */ }
      });
    }

    // 6d. Volume updates
    if (_snippetParsed.volume_updates) {
      _snippetParsed.volume_updates.forEach(function(vu) {
        try {
          store.updateVolume(vu.id, vu.patch);
          counts.volumeUpdates++;
        } catch(e) { /* skip if not found */ }
      });
    }

    // 7. Apocrypha (Phase 5 — upsert: update if exists, create if not)
    if (_snippetParsed.apocrypha) {
      _snippetParsed.apocrypha.forEach(function(a) {
        var exists = store.apocrypha.some(function(x) { return x.id === a.id; });
        try {
          if (!exists) {
            store.addApocryphon(a);
          } else {
            store.updateApocryphon(a.id, a);
          }
          counts.apocrypha++;
        } catch(e) { /* skip */ }
      });
    }

    // 8. Lore (Phase 1 — upsert). Accept both shapes:
    //    { lore: [ { ... } ] }  and  { new_lore: [ { op, data: { ... } } ] }
    var _importLore = [];
    if (_snippetParsed.lore && Array.isArray(_snippetParsed.lore)) {
      _importLore = _importLore.concat(_snippetParsed.lore);
    }
    if (_snippetParsed.new_lore && Array.isArray(_snippetParsed.new_lore)) {
      _snippetParsed.new_lore.forEach(function(op) {
        var d = op.data || op;
        if (d && d.id) _importLore.push(d);
      });
    }
    if (_importLore.length > 0) {
      _importLore.forEach(function(l) {
        if (!l.category || LORE_CATEGORIES.indexOf(l.category) === -1) return;
        var exists = store.lore.some(function(x) { return x.id === l.id; });
        try {
          if (!exists) {
            // Back-compat: governance-lore snippets use `volumes`, dissertation uses `domain`
            var entry = {
              id: l.id, title: l.title, category: l.category,
              body: l.body || '',
              domain: Array.isArray(l.domain) ? l.domain : (Array.isArray(l.volumes) ? l.volumes : []),
              tags: Array.isArray(l.tags) ? l.tags : [],
              references: Array.isArray(l.references) ? l.references : (l.canon_id ? [l.canon_id] : []),
              created: l.created || l.date || localDateStr(),
              updated: l.updated || l.date || localDateStr(),
              sourceType: l.sourceType || 'manual',
              sourceId: l.sourceId || null
            };
            store.addLore(entry);
          } else {
            var patch = {};
            ['title','category','body','domain','tags','references','sourceType','sourceId','created'].forEach(function(k) {
              if (l.hasOwnProperty(k)) patch[k] = l[k];
            });
            // Back-compat field translation on update
            if (!patch.domain && Array.isArray(l.volumes)) patch.domain = l.volumes;
            if (!patch.references && l.canon_id) patch.references = [l.canon_id];
            store.updateLore(l.id, patch);
          }
          counts.lore++;
        } catch(e) { /* skip */ }
      });
    }

    var parts = [];
    if (counts.sessions) parts.push(counts.sessions + ' session');
    if (counts.canons) parts.push(counts.canons + ' canon' + (counts.canons > 1 ? 's' : ''));
    if (counts.schisms) parts.push(counts.schisms + ' schism' + (counts.schisms > 1 ? 's' : ''));
    if (counts.todos) parts.push(counts.todos + ' TODO' + (counts.todos > 1 ? 's' : ''));
    if (counts.newChapters) parts.push(counts.newChapters + ' new chapter' + (counts.newChapters > 1 ? 's' : ''));
    if (counts.chapterUpdates) parts.push(counts.chapterUpdates + ' chapter update' + (counts.chapterUpdates > 1 ? 's' : ''));
    if (counts.canonUpdates) parts.push(counts.canonUpdates + ' canon update' + (counts.canonUpdates > 1 ? 's' : ''));
    if (counts.todoUpdates) parts.push(counts.todoUpdates + ' TODO update' + (counts.todoUpdates > 1 ? 's' : ''));
    if (counts.volumeUpdates) parts.push(counts.volumeUpdates + ' volume update' + (counts.volumeUpdates > 1 ? 's' : ''));

/* --- Phase 2: Wizard Handlers --- */
function handleWizardValidate() {
  var repoInput = document.getElementById('field-wizard-repo');
  var tokenInput = document.getElementById('field-wizard-token');
  var statusEl = document.getElementById('wizard-validation-status');
  if (!repoInput || !tokenInput) return;

  var rawUrl = repoInput.value.trim();
  var token = tokenInput.value.trim();

  if (!rawUrl || !token) {
    if (statusEl) statusEl.innerHTML = '<div class="cx-form-error" style="display:block">Both fields are required</div>';
    return;
  }

  var normalized = normalizeRepoUrl(rawUrl);
  if (!normalized) {
    if (statusEl) statusEl.innerHTML = '<div class="cx-form-error" style="display:block">Invalid repository URL. Use: owner/repo</div>';
    return;
  }

  if (statusEl) statusEl.innerHTML = '<div class="cx-settings-hint">Validating\u2026</div>';

  validateToken(normalized, token).then(function(result) {
    if (result.valid) {
      localStorage.setItem(KEYS.REPO_URL, normalized);
      localStorage.setItem(KEYS.TOKEN, token);
      localStorage.setItem(KEYS.DEFAULT_BRANCH, result.defaultBranch || 'main');
      localStorage.setItem(KEYS.WIZARD_DONE, 'true');
      if (statusEl) statusEl.innerHTML = '<div style="color:var(--success)">' + cx('check') + ' Connected to ' + escHtml(result.repoFullName) + '</div>';
      setTimeout(function() { _wizardStep = 3; renderWizard(); }, 800);
    } else {
      if (statusEl) statusEl.innerHTML = '<div class="cx-form-error" style="display:block">' + escHtml(result.reason) + '</div>';
    }
  });
}

/* ============================================================
   Swipe Navigation (canon from SproutLab SWIPE_NAVIGATION_REFERENCE)
   ============================================================ */
var TAB_ORDER = ['dashboard', 'journal', 'canons', 'lore', 'todos'];
var _swipeStartX = 0, _swipeStartY = 0, _swipeTarget = null;

function setupSwipeNavigation() {
  var vc = document.getElementById('viewContainer');
  if (!vc) return;

  vc.addEventListener('touchstart', function(e) {
    var touch = e.changedTouches[0];
    _swipeStartX = touch.screenX;
    _swipeStartY = touch.screenY;
    _swipeTarget = e.target;
  }, { passive: true });

  vc.addEventListener('touchend', function(e) {
    var touch = e.changedTouches[0];
    var dx = touch.screenX - _swipeStartX;
    var dy = touch.screenY - _swipeStartY;

    // Must be horizontal dominant (canon: |dx| > 60, |dy| < |dx| * 0.7)
    if (Math.abs(dx) < 60 || Math.abs(dy) > Math.abs(dx) * 0.7) return;

    // Suppress during text input
    var active = document.activeElement;
    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT')) return;

    // Suppress during overlays
    if (!document.getElementById('overlayContainer').hidden) return;
    if (!document.getElementById('confirmContainer').hidden) return;

    // Only swipe on tab-level views
    var tabIndex = TAB_ORDER.indexOf(_currentView);
    if (tabIndex === -1) return;

    // Suppress inside horizontally scrollable elements (canon: scrollWidth > clientWidth + 2)
    var el = _swipeTarget;
    while (el && el !== vc) {
      if (el.scrollWidth > el.clientWidth + 2) {
        var style = getComputedStyle(el);
        if (style.overflowX !== 'hidden' && style.overflowX !== 'visible') return;
      }
      el = el.parentElement;
    }

    if (dx < -60 && tabIndex < TAB_ORDER.length - 1) {
      handleSwitchTab(TAB_ORDER[tabIndex + 1]);
    } else if (dx > 60 && tabIndex > 0) {
      handleSwitchTab(TAB_ORDER[tabIndex - 1]);
    }
  }, { passive: true });
}

/* ============================================================
   Pull-to-Refresh
   ============================================================ */
var _pullStartY = 0, _pullable = false;

function setupPullToRefresh() {
  var vc = document.getElementById('viewContainer');
  if (!vc) return;

  // Create pull indicator (outside viewContainer so it persists across renders)
  var indicator = document.createElement('div');
  indicator.id = 'pullIndicator';
  indicator.className = 'cx-pull-indicator';
  indicator.innerHTML = '<div class="cx-pull-spinner">' + cx('refresh') + '</div>';
  vc.parentNode.insertBefore(indicator, vc);

  var THRESHOLD = 80;

  vc.addEventListener('touchstart', function(e) {
    _pullable = (vc.scrollTop <= 0);
    if (_pullable) _pullStartY = e.changedTouches[0].screenY;
  }, { passive: true });

  vc.addEventListener('touchmove', function(e) {
    if (!_pullable) return;
    if (!document.getElementById('overlayContainer').hidden) return;
    var dy = e.changedTouches[0].screenY - _pullStartY;
    var dx = e.changedTouches[0].screenX - _swipeStartX;
    if (dy <= 0 || Math.abs(dx) > dy * 0.5) {
      indicator.style.height = '0';
      indicator.style.opacity = '0';
      return;
    }
    // Resistance feel: dampen the pull
    var pull = Math.min(dy * 0.4, 60);
    indicator.style.height = pull + 'px';
    indicator.style.opacity = String(Math.min(dy / THRESHOLD, 1));
    var spinner = indicator.querySelector('.cx-pull-spinner');
    if (spinner) {
      var rotation = Math.min((dy / THRESHOLD) * 360, 360);
      spinner.style.transform = 'rotate(' + rotation + 'deg)';
      indicator.classList.toggle('cx-pull-ready', dy >= THRESHOLD);
    }
  }, { passive: true });

  vc.addEventListener('touchend', function(e) {
    if (!_pullable) return;
    _pullable = false;
    var dy = e.changedTouches[0].screenY - _pullStartY;
    var dx = e.changedTouches[0].screenX - _swipeStartX;

    if (dy >= THRESHOLD && Math.abs(dx) < dy * 0.5) {
      // Trigger refresh — hold indicator open with spin animation
      indicator.classList.add('cx-pull-refreshing');
      indicator.classList.remove('cx-pull-ready');
      indicator.style.height = '48px';
      indicator.style.opacity = '1';
      handlePullRefresh().then(function() { collapsePullIndicator(indicator); });
    } else {
      // Cancelled — collapse
      collapsePullIndicator(indicator);
    }
  }, { passive: true });
}

function collapsePullIndicator(indicator) {
  if (!indicator) indicator = document.getElementById('pullIndicator');
  if (!indicator) return;
  indicator.style.transition = 'height 0.3s ease, opacity 0.3s ease';
  indicator.style.height = '0';
  indicator.style.opacity = '0';
  indicator.classList.remove('cx-pull-refreshing', 'cx-pull-ready');
  var spinner = indicator.querySelector('.cx-pull-spinner');
  if (spinner) spinner.style.transform = '';
  setTimeout(function() { indicator.style.transition = ''; }, 300);
}

function handlePullRefresh() {
  if (!localStorage.getItem(KEYS.REPO_URL)) {
    renderCurrentView();
    return Promise.resolve();
  }
  return fetchAll().then(function(f) {
    populateStore(f['volumes.json'], f['canons.json'], f['journal.json']);
    replayWal(store._wal);
    renderCurrentView();
    showToast('Synced', 'success');
  }).catch(function() {
    showToast('Refresh failed', 'error');
  });
}

var _gesturesReady = false;
function setupGestures() {
  if (_gesturesReady) return;
  _gesturesReady = true;
  setupSwipeNavigation();
  setupPullToRefresh();
}

/* ============================================================
   PHASE 1 LORE — Auto-Generation Hooks
   Dissertation §3.4: "Every major lifecycle event MUST auto-generate
   a Lore entry. The Architect confirms/edits but the system proposes."

   Available lifecycle events in today's Codex (analogs to RPG events):
     - Chapter status → abandoned   (Ember snuffed analog)   → Cautionary Tale
     - Volume shelf → archived/abandoned (Rite released analog) → Chronicle
     - Canon status → superseded    (Socratic response analog) → Doctrine

   We wrap store mutations to capture the transition, then present the
   Architect with a proposed Lore entry (prefill form). Nothing auto-commits.
   ============================================================ */

var _autoLorePending = {}; // keyed by proposal id → prefill object
var _loreHooksInstalled = false;

function installLoreAutoHooks() {
  if (_loreHooksInstalled) return;
  _loreHooksInstalled = true;

  var origUpdateChapter = store.updateChapter;
  store.updateChapter = function(volumeId, chapterId, patch) {
    var vol = store.volumes.find(function(v) { return v.id === volumeId; });
    var before = vol ? (vol.chapters || []).find(function(c) { return c.id === chapterId; }) : null;
    var beforeStatus = before ? before.status : null;
    var result = origUpdateChapter.call(store, volumeId, chapterId, patch);
    if (before && patch && patch.status === 'abandoned' && beforeStatus !== 'abandoned') {
      proposeAutoLore({
        sourceType: 'chapter_abandoned',
        sourceId: chapterId,
        category: 'cautionary_tales',
        title: 'Abandoned: ' + (before.name || chapterId),
        body: 'The chapter "' + (before.name || chapterId) + '" in ' + (vol ? vol.name : volumeId) + ' was abandoned. Document the lesson.',
        domain: [volumeId],
        references: [chapterId, volumeId]
      });
    }
    return result;
  };

  var origTransitionShelf = store.transitionShelf;
  store.transitionShelf = function(volumeId, newShelf, reason) {
    var vol = store.volumes.find(function(v) { return v.id === volumeId; });
    var beforeShelf = vol ? vol.shelf : null;
    var result = origTransitionShelf.call(store, volumeId, newShelf, reason);
    if (vol && (newShelf === 'archived' || newShelf === 'abandoned') && beforeShelf !== newShelf) {
      proposeAutoLore({
        sourceType: 'volume_archived',
        sourceId: volumeId,
        category: 'chronicles',
        title: (newShelf === 'abandoned' ? 'Abandoned: ' : 'Archived: ') + vol.name,
        body: 'The volume "' + vol.name + '" was moved to ' + newShelf + '.' + (reason ? ' Reason: ' + reason : '') + ' What did this chapter of work teach?',
        domain: [volumeId],
        references: [volumeId],
        tags: [newShelf]
      });
    }
    return result;
  };

  var origUpdateCanon = store.updateCanon;
  store.updateCanon = function(id, patch) {
    var before = store.canons.find(function(c) { return c.id === id; });
    var beforeStatus = before ? before.status : null;
    var result = origUpdateCanon.call(store, id, patch);
    if (before && patch && patch.status === 'superseded' && beforeStatus !== 'superseded') {
      proposeAutoLore({
        sourceType: 'canon_superseded',
        sourceId: id,
        category: 'doctrines',
        title: 'Superseded: ' + (before.title || id),
        body: 'Canon "' + (before.title || id) + '" was superseded' + (patch.superseded_by ? ' by ' + patch.superseded_by : '') + '. The doctrine that replaces it, and why the shift.',
        references: [id].concat(patch.superseded_by ? [patch.superseded_by] : [])
      });
    }
    return result;
  };
}

function proposeAutoLore(prefill) {
  var pid = 'autolore-' + Date.now() + '-' + Math.random().toString(36).substr(2, 4);
  _autoLorePending[pid] = prefill;
  // Toast with action to accept; passive dismissal possible via X on toast/banner
  var banner = document.createElement('div');
  banner.className = 'cx-autolore-banner';
  banner.id = pid;
  banner.innerHTML =
    '<div class="cx-autolore-title">' + cx('tome') + ' Propose Lore entry?</div>'
    + '<div class="cx-autolore-meta">' + escHtml(LORE_CATEGORY_LABELS[prefill.category] || prefill.category) + ' \u00B7 from ' + escHtml((prefill.sourceType || '').replace(/_/g, ' ')) + '</div>'
    + '<div class="cx-autolore-actions">'
    + '<button class="cx-btn-secondary cx-btn-sm" data-action="dismissAutoLore" data-id="' + escAttr(pid) + '">Dismiss</button>'
    + '<button class="cx-btn-primary cx-btn-sm" data-action="acceptAutoLore" data-id="' + escAttr(pid) + '">Compose</button>'
    + '</div>';
  document.body.appendChild(banner);
  requestAnimationFrame(function() { banner.classList.add('cx-autolore-visible'); });
  // Auto-dismiss after 20s
  setTimeout(function() {
    if (_autoLorePending[pid]) handleDismissAutoLore(pid);
  }, 20000);
}

function handleAcceptAutoLore(pid) {
  var prefill = _autoLorePending[pid];
  if (!prefill) return;
  delete _autoLorePending[pid];
  var banner = document.getElementById(pid);
  if (banner && banner.parentNode) banner.parentNode.removeChild(banner);
  openCreateLore(prefill);
}

function handleDismissAutoLore(pid) {
  delete _autoLorePending[pid];
  var banner = document.getElementById(pid);
  if (!banner) return;
  banner.classList.remove('cx-autolore-visible');
  setTimeout(function() { if (banner.parentNode) banner.parentNode.removeChild(banner); }, 200);
}

/* --- Initialize (Phase 2: full 15-step lifecycle) --- */
function initializeApp() {
  if (!testLocalStorage()) {
    document.getElementById('viewContainer').innerHTML = '<div class="cx-blocker"><p>Codex requires local storage.</p></div>';
    return;
  }

  // Register service worker (async, non-blocking)
  registerServiceWorker();

  initTabIcons();

  // Step 5: Check if wizard needed
  var repoUrl = localStorage.getItem(KEYS.REPO_URL);
  var wizardDone = localStorage.getItem(KEYS.WIZARD_DONE);
  if (!repoUrl && !wizardDone) {
    document.getElementById('tabBar').hidden = true;
    var fab = document.getElementById('fabButton');
    if (fab) fab.classList.add('cx-fab-hidden');
    renderWizard();
    setupDelegation();
    document.addEventListener('keydown', _escapeHandler);
    return;
  }

  // Step 7: Load WAL from localStorage
  try { store._wal = JSON.parse(localStorage.getItem(KEYS.WAL) || '[]'); } catch(e) { store._wal = []; }
  store._wal.forEach(function(e) { if (e.status === 'syncing') e.status = 'pending'; });

  // Step 8-10: Fetch or load from cache
  var bootPromise;
  if (repoUrl) {
    bootPromise = fetchAllWithProgressiveMessages();
  } else {
    // Local-only mode: load from cache
    bootPromise = Promise.resolve({
      'volumes.json': { data: safeParseLocalStorage(KEYS.CACHE_VOLUMES), sha: null, fromCache: true },
      'canons.json': { data: safeParseLocalStorage(KEYS.CACHE_CANONS), sha: null, fromCache: true },
      'journal.json': { data: safeParseLocalStorage(KEYS.CACHE_JOURNAL), sha: null, fromCache: true }
    });
  }

  bootPromise.then(function(fetched) {
    // Seed on first visit (local-only mode, Phase 1 compat)
    var volData = fetched['volumes.json'].data;
    var canonData = fetched['canons.json'].data;
    var journalData = fetched['journal.json'].data;

    if (!repoUrl) {
      var currentSeedVer = typeof SEED_VERSION === 'number' ? SEED_VERSION : 0;
      var storedSeedVer = parseInt(localStorage.getItem('codex-seed-version') || '0', 10);
      var needsSeed = (!volData && !canonData && !journalData) || (currentSeedVer > storedSeedVer);
      if (needsSeed && typeof getSeedVolumes === 'function') {
        fetched['volumes.json'] = { data: getSeedVolumes(), sha: null };
        fetched['canons.json'] = { data: getSeedCanons(), sha: null };
        fetched['journal.json'] = { data: getSeedJournal(), sha: null };
        localStorage.setItem('codex-seed-version', String(currentSeedVer));
      }
    }

    // Step 10: Populate store
    populateStore(fetched['volumes.json'], fetched['canons.json'], fetched['journal.json']);

    // Step 11: Replay WAL
    replayWal(store._wal);

    // Step 11.5: Run migrations (Phase 5)
    if (typeof CODEX_MIGRATIONS !== 'undefined') {
      var _applied = JSON.parse(localStorage.getItem('codex-migrations') || '[]');
      CODEX_MIGRATIONS.forEach(function(m) {
        if (_applied.indexOf(m.id) !== -1) return;
        try { m.run(); _applied.push(m.id); }
        catch(e) { logError('migration', m.id, e.message); }
      });
      localStorage.setItem('codex-migrations', JSON.stringify(_applied));
      store._cacheToLocalStorage();
    }

    // Phase 1 Lore: install auto-gen lifecycle hooks once store is populated
    installLoreAutoHooks();

    // Step 12: Register listeners
    store.onChange(function() {
      if (!_initializing) renderCurrentView();
    });
    store.onWalChange(function() {
      renderSyncIndicator();
      renderTabBadge();
    });

    // Step 13-14: Parse route and render
    var route = parseRoute(location.hash);
    _currentView = route.view;
    _currentViewParams = route;
    document.getElementById('tabBar').hidden = false;
    updateTabBarActive(route.view);
    renderBreadcrumbForRoute(route);
    updateFab(route.view);

    // Step 15: Finish initialization
    _initializing = false;
    renderCurrentView();

    // Post-init
    purgeOldWalEntries();
    renderSyncIndicator();
    renderTabBadge();
    setupGestures();

    var visits = parseInt(localStorage.getItem(KEYS.VISIT_COUNT) || '0', 10) + 1;
    localStorage.setItem(KEYS.VISIT_COUNT, String(visits));
  }).catch(function(e) {
    logError('init', 'Boot failed', e.message);
    _initializing = false;
    // Fall back to cached data
    populateStore(
      { data: safeParseLocalStorage(KEYS.CACHE_VOLUMES), sha: null },
      { data: safeParseLocalStorage(KEYS.CACHE_CANONS), sha: null },
      { data: safeParseLocalStorage(KEYS.CACHE_JOURNAL), sha: null }
    );
    renderCurrentView();
    showToast('Loaded from cache \u2014 some data may be stale', 'warning');
  });

  // Setup interaction (immediate, before async boot completes)
  setupDelegation();
  document.addEventListener('keydown', _escapeHandler);
  window.addEventListener('hashchange', function() {
    if (_navigating) return;
    handleRouteChange(location.hash, true);
  });
  window.addEventListener('pageshow', handlePageShow);
}

// Boot
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initializeApp);
} else {
  initializeApp();
}

})();
</script>
